name: Bug report
description: Report something that is broken or not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please include enough detail so it can be reproduced.

  - type: input
    id: url
    attributes:
      label: Page URL (if applicable)
      description: Link to the page where the bug happens.
      placeholder: "https://youngcoder45.netlify.app/#projects"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I click …, the page …"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to …
        2. Click …
        3. Scroll to …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "It should …"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "Instead, it …"
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Paste any errors from DevTools Console.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - Other (please specify below)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else.
    validations:
      required: false
